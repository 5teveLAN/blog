        <h1>提早的重要性</h1>

        

        <h3 id="慘痛的教訓">慘痛的教訓</h3>
<p>我的 TCP/IP 課程的自主學習作業因上課沒好好上，讓我很不想做、一再拖延，最後：</p>
<ul>
<li>報告遲交十秒，系統關閉</li>
<li>面臨直接放棄交、還是寫信求（麻煩）老師的困境</li>
<li>最後決定寫信問老師，找尋機會</li>
<li>有先詢問學長意見</li>
</ul>
<p>結果：</p>
<ul>
<li>學長叫我自己寫信去問</li>
<li>老師沒回我信</li>
</ul>
<p>就算作業寫得再好，我一夕之間從好學生(?)變成了不受人待見的壞學生。不過我也學到了教訓：</p>
<ul>
<li>規定就是規定，差 0.1 秒也是一樣</li>
<li>先交爛版本，不要等完美版本做出來再交</li>
</ul>
