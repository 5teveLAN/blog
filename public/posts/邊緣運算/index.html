        <h1>邊緣運算</h1>

        

        <p>剛開學時正在上 jserv 的課，我很瞧不起我們學校的課。我問魏老師：「你這個課有沒有解決真實問題？」覺得我們的課強度不高，加上選這門課的人啥都不會，我就當場退選了。原因就是我好怕像<a href="/posts/%E9%8A%98%E5%82%B3%E9%9B%BB%E6%A9%9F%E7%B3%BB%E7%9A%84%E8%AA%B2%E6%80%8E%E9%BA%BC%E6%A8%A3/">電機系的課</a>一樣，沒學到東西。</p>
<p>其實當時有認識的人一起上：一個靠譜的活人同學、一個搞很多專題的學長（程設助教）。唉，後來挺後悔退選這個課的。其實課堂上學不到什麼東西，能學到東西是在於分組做事的時侯。大多數人程度怎樣不是重點，重點是能找到程度差不多、甚至更強力的隊友，就一定能學到很多東西。</p>
