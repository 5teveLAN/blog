    <article>
        <h1>為什麼要愛物</h1>

        

        <p>我在賣用不到的東西時，常常因為物品狀況不佳感到煩惱。比如說我的筆電總是坑坑疤疤，各種物品上也都是刮痕。</p>
<p>我之前很鄙視那些給相機貼膜，只為了有更好賣相的人。彷彿買了不是為了拍，而是更在意賣的時候。</p>
<p>我總是以「東西就是要拿來用」、「用到壞」來合理化自己粗魯地使用物品。以為買了一件物品，就是永遠佔有它。但是這些物品總會有退役、不喜歡和用不到的時候。</p>
<p>如果這些東西因為狀況不佳而直接丟棄，反而更可惜。不如現在好好保存，一方面是容易脫手給別人，另一方面是讓還能用的東西繼續使用。</p>
