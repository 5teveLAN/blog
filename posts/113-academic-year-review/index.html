        <h1>113 學年回顧</h1>

        

        <h2 id="113-1-銘傳">113-1 銘傳</h2>
<p><strong>銘傳一週</strong><br>
一兩週都會拍些學校活動，幫助我認識環境，獲得一些情感支持</p>
<p><strong>勇闖廣電系</strong><br>
一方面很感興趣，一方面要答應回去找雪莉<br>
退了一門，另一門繼續上繼續拍片，但好像不太適合我</p>
<p><strong>系隊</strong><br>
太晚才進去，沒有分到組，自己練練覺得無聊別人吵就梅去了</p>
<p><strong>轉學夢碎</strong><br>
微積分不愛讀</p>
<h3 id="總結">總結</h3>
<p>說實話其實覺得混得還算可以了，對於轉學生來說。</p>
<h2 id="113-2-銘傳">113-2 銘傳</h2>
<p><strong>EMO</strong><br>
越來越討厭這裡，校慶都不想去。後來有配合諮商，找老師聊</p>
<p><strong>向上</strong><br>
特別愛讀離散數學，演算法，但還是愛睡覺蹺課</p>
<p><strong>專研</strong><br>
很後悔自己沒有認真看待這回事，只能亡羊補牢。很感謝班導的幫助。</p>
